<!-- index.html -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#000000" />

  <title>SaibaKen Studio | サクッと遊べて、楽しい。</title>
  <meta name="description" content="SaibaKen Studio. サクッと遊べて、楽しい。Simple fun, instantly." />

  <!-- 预加载主图（同目录 main.jpg） -->
  <link rel="preload" as="image" href="main.jpg" />

  <!-- Open Graph / Twitter（相对路径可用；想更稳可改成绝对 URL） -->
  <meta property="og:title" content="SaibaKen Studio" />
  <meta property="og:description" content="サクッと遊べて、楽しい。Simple fun, instantly." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="main.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="main.jpg" />

  <!-- 安全策略：允许本站资源与 Google AdSense 广告脚本 -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.google.com https://*.googleadservices.com https://*.doubleclick.net;
                 script-src-elem 'self' https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.google.com https://*.googleadservices.com https://*.doubleclick.net;
                 img-src 'self' data: https:;
                 style-src 'self' 'unsafe-inline';
                 connect-src 'self' https:;
                 frame-src https:;
                 child-src https:;
                 base-uri 'none';
                 form-action 'none';
                 frame-ancestors 'none'">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9259452753673673"
     crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #000;
      --fg: rgba(255,255,255,0.88);
      --fg-dim: rgba(255,255,255,0.68);
      --line: rgba(255,255,255,0.14);
      --footer-h: 56px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      overflow: hidden; /* 保证无滚动条 */
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    /* 主图：等比缩放，尽量完整显示 */
    .hero {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 图片加载失败提示 */
    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      color: var(--fg-dim);
      letter-spacing: 0.02em;
    }

    /* 底部固定栏：尽量不打扰画面 */
    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--footer-h);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }

    footer a {
      color: var(--fg);
      text-decoration: none;
      font-size: 12px;
      line-height: 1;
      opacity: 0.92;
    }
    footer a:hover { text-decoration: underline; opacity: 1; }
    footer .sep {
      width: 1px;
      height: 14px;
      background: var(--line);
    }
    footer .note {
      color: var(--fg-dim);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      opacity: 0.9;
    }

    /* 小屏时允许换行 */
    @media (max-width: 520px) {
      footer {
        height: auto;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px 12px;
      }
      footer .note { white-space: normal; text-align: center; }
    }
  </style>
</head>

<body>
  <main class="stage" aria-label="SaibaKen Studio">
    <img
      class="hero"
      src="main.jpg"
      width="1920"
      height="1080"
      alt="SaibaKen Studio - サクッと遊べて、楽しい。"
      onerror="document.getElementById('fallback').style.display='flex'; this.style.display='none';"
    />

    <div id="fallback" class="fallback" role="alert" aria-live="polite">
      main.jpg の読み込みに失敗しました。<br/>
      Please make sure <b>main.jpg</b> is in the same folder as <b>index.html</b>.
    </div>
  </main>

  <noscript>
    <style>
      body { overflow: auto; }
      .fallback { display: flex; }
      .hero { display: none; }
    </style>
    <div class="fallback" role="alert">
      JavaScript が無効です。画像が表示されない場合は main.jpg の配置をご確認ください。<br/>
      JavaScript is disabled. Please verify main.jpg is placed correctly.
    </div>
  </noscript>
</body>
</html>
